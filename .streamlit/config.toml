[theme]

base = "light"

primaryColor = "#4F88A8"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#E8F3F8"
textColor = "#1F2A30"

redColor = "#C7332A"
orangeColor = "#D96B2B"
yellowColor = "#E6B422"
blueColor = "#4F88A8"
greenColor = "#2FA36B"
violetColor = "#6A4FB3"
grayColor = "#6B7C86"

redBackgroundColor = "#F8D7D5"
orangeBackgroundColor = "#FBE5D6"
yellowBackgroundColor = "#FFF4CC"
blueBackgroundColor = "#DCEAF2"
greenBackgroundColor = "#D9F2E6"
